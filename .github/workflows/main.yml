name: Deploy Project to Main

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Install Composer Dependencies
      run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

    - name: Install NPM Dependencies
      run: npm install

    - name: Build NPM Assets
      run: npm run build

    - name: Prepare Laravel Application
      run: cp .env.testing .env

    - name: Run Tests
      run: php artisan test

    - name: Laravel Pint
      run: ./vendor/bin/pint --test

    - name: PHPStan
      run: ./vendor/bin/phpstan analyse --memory-limit 512M --configuration=phpstan.neon

    - name: Deploy Files Locally
      run: |
        # -v: verbose, -r: recursive, -l: links, -t: times
        # We REMOVE -p (permissions) and -g (group) to stop the errors
        rsync -vrlptz --delete \
          --exclude='.git' \
          --exclude='node_modules' \
          --exclude='.env' \
          --exclude='storage' \
          ./ ${{ secrets.WORK_DIR }}/

    - name: Run Artisan Commands
      run: |
        cd ${{ secrets.WORK_DIR }}
        php artisan down
        php artisan migrate --force
        php artisan optimize
        php artisan up